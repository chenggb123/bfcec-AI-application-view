services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bfcec-portal
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Persist uploaded screenshots/videos/thumbnails on the host
      - ./public/uploads:/app/public/uploads
      # Persist data files (products.json, categories.json, etc.)
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
